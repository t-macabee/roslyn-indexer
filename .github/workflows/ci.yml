name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test tests/Lurp.Storage.Tests.csproj
          --no-build --configuration Release --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Flake guard (storage suite × 20)
        # Runs the storage suite 20 times and fails the build on ANY single failure.
        # Catches teardown/lifecycle races that appear intermittently (~1 in 15–30 runs).
        shell: pwsh
        run: |
          for ($i = 1; $i -le 20; $i++) {
            dotnet test tests/Lurp.Storage.Tests.csproj --no-build --configuration Release --nologo
            if ($LASTEXITCODE -ne 0) { Write-Error "Flake detected on run $i"; exit 1 }
          }

      - name: Run clean-rebuild equivalence test
        # This test loads MSBuildWorkspace and exercises the real incremental/full
        # indexing paths end-to-end. A failure here blocks the merge.
        run: >
          dotnet test tests/Lurp.Storage.Tests.csproj
          --no-build
          --configuration Release
          --filter "FullyQualifiedName=Lurp.Storage.Tests.CleanRebuildEquivalenceTest.IncrementalIndex_Matches_FullRebuild_AfterSingleFileChange"
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Flatten coverage files for NDepend
        # dotnet test --collect:"XPlat Code Coverage" writes to
        # TestResults/<guid>/coverage.cobertura.xml. NDepend's CoverageDir
        # searches non-recursively, so copy the file to TestResults/ root.
        shell: pwsh
        run: |
          $coverageFiles = Get-ChildItem -Path ./TestResults -Recurse -Filter "coverage.cobertura.xml"
          if ($coverageFiles.Count -gt 0) {
            Copy-Item -Path $coverageFiles[0].FullName -Destination "./TestResults/coverage.cobertura.xml" -Force
            Write-Host "Copied $($coverageFiles[0].FullName) to ./TestResults/coverage.cobertura.xml"
          } else {
            Write-Warning "No coverage.cobertura.xml found in TestResults subdirectories"
          }

      - name: Install NDepend
        run: choco install ndepend --no-progress -y

      - name: Build (Debug) for NDepend
        # Lurp.ndproj analyzes the Debug configuration, but the steps above build
        # Release. Produce the Debug assemblies so NDepend has something to analyze.
        run: dotnet build --configuration Debug

      - name: Run NDepend quality gates
        # Enforcing gate. NDepend compares against the pinned baseline
        # (baselines/Lurp-baseline.ndar) and returns a non-zero exit code when a
        # quality gate fails, because ForceReturnZeroExitCode is False in Lurp.ndproj.
        # A failing gate (e.g. Critical Rules Violated > 0) now blocks the merge.
        shell: pwsh
        run: |
          $ndepend = Resolve-Path "$env:ChocolateyInstall\lib\ndepend\tools\NDepend.Console.exe"
          & $ndepend Lurp.ndproj /Silent
          if ($LASTEXITCODE -ne 0) {
            Write-Error "NDepend quality gate failed (exit code $LASTEXITCODE). See the ndepend-report artifact."
            exit $LASTEXITCODE
          }

      - name: Upload NDepend report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ndepend-report
          path: NDependOut/
          if-no-files-found: ignore
